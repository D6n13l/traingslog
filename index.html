<title>Trainingslog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0F12;
    --surface:#1A1B20;
    --surface-2:#232429;
    --surface-3:#2C2D33;
    --border:#302F35;
    --border-strong:#414149;
    --text:#F3F2F0;
    --text-2:#9B9AA1;
    --text-3:#67666D;
    --accent:#E8362B;
    --accent-strong:#C4281E;
    --accent-soft:rgba(232,54,43,.16);
    --accent-soft-2:rgba(232,54,43,.28);
    --green:#3FAE6A;
    --glow-green:#39D97A;
    --radius:16px;
    --radius-sm:10px;
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  @media (forced-colors: active){ *{ forced-color-adjust:none; } }
  input, select, textarea, button{
    appearance:none; -webkit-appearance:none;
    color-scheme:dark;
  }
  input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus{
    -webkit-box-shadow:0 0 0 30px var(--surface-2) inset !important;
    -webkit-text-fill-color:var(--text) !important;
    caret-color:var(--text);
  }
  html{background:var(--bg); color-scheme:dark;}
  html,body{margin:0;padding:0;overscroll-behavior-y:none;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;
    min-height:100svh;
    color-scheme:dark;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Oswald',sans-serif;}
  button, input{font-family:inherit;}
  ::selection{background:var(--accent-soft-2);}

  .screen{display:none;}
  .screen.active{display:block;}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:50;
    background:rgba(20,21,25,.92); backdrop-filter:blur(14px);
    border-top:1px solid var(--border);
    display:flex;
    padding:8px 8px calc(8px + var(--safe-b));
  }
  .bottom-nav.hidden{display:none;}
  .nav-item{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    background:none; border:none; color:var(--text-3); font-size:11px; font-weight:600;
    padding:6px 0; cursor:pointer;
  }
  .nav-item svg{width:22px; height:22px;}
  .nav-item.active{color:var(--accent);}

  /* ---------- Home screen ---------- */
  .home-header{
    padding:calc(22px + var(--safe-t)) 20px 8px;
  }
  .home-header .eyebrow{
    font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--accent); font-weight:700;
  }
  .home-header h1{
    font-family:'Oswald',sans-serif; font-size:28px; font-weight:700;
    margin:4px 0 0; letter-spacing:.01em;
  }
  .home-question{
    font-size:14px; color:var(--text-2); margin:4px 2px 10px; line-height:1.4;
  }
  .home-list{padding:14px 16px 100px;}

  .week-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-bottom:18px;
  }
  .week-card-main{display:flex; align-items:center; gap:16px;}
  .week-ring-wrap{position:relative; width:84px; height:84px; flex-shrink:0;}
  .week-ring-wrap::before{
    content:''; position:absolute; inset:-16px; border-radius:50%;
    background:radial-gradient(circle, var(--accent) 0%, transparent 70%);
    filter:blur(13px); opacity:.3; z-index:0;
    animation: ringGlowPulse 3.2s ease-in-out infinite;
  }
  .week-ring-wrap.complete::before{ background:radial-gradient(circle, var(--glow-green) 0%, transparent 70%); }
  @keyframes ringGlowPulse{
    0%,100%{ opacity:.22; transform:scale(.9); }
    50%{ opacity:.5; transform:scale(1.08); }
  }
  .week-ring, .week-ring-label{position:relative; z-index:1;}
  .week-ring{width:100%; height:100%; transform:rotate(-90deg);}
  .week-ring-track{fill:none; stroke:var(--surface-2); stroke-width:8;}
  .week-ring-fill{
    fill:none; stroke:var(--accent); stroke-width:8; stroke-linecap:round;
    stroke-dasharray:264; stroke-dashoffset:264;
    filter:drop-shadow(0 0 6px var(--accent)); transition:stroke .3s, filter .3s;
  }
  .week-ring-fill.complete{ stroke:var(--glow-green); filter:drop-shadow(0 0 6px var(--glow-green)); }
  .week-ring-label{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:15px;
  }
  .week-card-info{flex:1; min-width:0;}
  .week-card-label{font-size:12px; color:var(--text-2); font-weight:600; letter-spacing:.02em; margin-bottom:6px;}
  .week-volume{display:flex; align-items:baseline; gap:6px; margin-bottom:6px;}
  .week-volume-num{font-family:'Oswald',sans-serif; font-size:20px; font-weight:700;}
  .week-volume-label{font-size:12px; color:var(--text-2);}
  .week-secondary{font-size:11.5px; color:var(--text-3);}
  .program-card{
    background:var(--surface); border:1px solid rgba(255,255,255,.5); border-radius:var(--radius);
    padding:18px 16px; margin-bottom:12px; position:relative; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .program-card:active{background:var(--surface-2);}
  .program-info h3{
    font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; margin:0 0 4px;
  }
  .program-info span{font-size:12.5px; color:var(--text-2);}
  .program-arrow{color:var(--text-3); font-size:20px; flex-shrink:0;}
  .program-actions{position:absolute; top:10px; right:10px; display:flex; gap:6px;}
  .program-edit, .program-del{
    width:26px; height:26px; border-radius:50%;
    background:var(--surface-2); border:none; color:var(--text-3); font-size:13px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .program-edit:active, .program-del:active{background:var(--surface-3);}
  .add-program-card{
    border:1.5px dashed var(--border-strong); border-radius:var(--radius);
    padding:18px; text-align:center; color:var(--accent); font-weight:600;
    font-family:'Oswald',sans-serif; font-size:15px; cursor:pointer; background:none;
    width:100%; letter-spacing:.02em;
  }
  .export-link{
    display:block; text-align:center; color:var(--text-2); font-size:12.5px; font-weight:600;
    margin-top:20px; background:none; border:1px solid var(--border); border-radius:999px;
    padding:9px; width:100%; cursor:pointer;
  }
  .reset-link{
    display:block; text-align:center; color:var(--text-3); font-size:11.5px;
    margin-top:10px; text-decoration:underline; background:none; border:none; width:100%; cursor:pointer;
  }

  /* ---------- Workout screen ---------- */
  .workout-header{
    padding:calc(14px + var(--safe-t)) 14px 0;
    display:flex; align-items:center; gap:10px;
    position:sticky; top:0; z-index:20; background:var(--bg);
  }
  .back-btn{
    width:38px; height:38px; border-radius:50%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); display:flex; align-items:center; justify-content:center; font-size:17px; cursor:pointer; flex-shrink:0;
  }
  .workout-header-title{flex:1; min-width:0;}
  .workout-header-title .eyebrow{font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); font-weight:600;}
  .workout-header-title h2{font-family:'Oswald',sans-serif; font-size:18px; margin:1px 0 0; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

  nav.tabs{
    display:flex; gap:6px; padding:14px 14px 0; overflow-x:auto; scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex:0 0 auto;
    font-family:'Oswald',sans-serif;
    font-size:13px; font-weight:600;
    padding:9px 15px; border-radius:999px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text-2);
    cursor:pointer;
    white-space:nowrap;
  }
  .tab.active{background:var(--accent); border-color:var(--accent); color:#fff;}
  .tab.complete{background:var(--glow-green); border-color:var(--glow-green); color:#0E0F12;}

  main{padding:14px; max-width:600px; margin:0 auto; padding-bottom:140px;}

  .day-heading{display:flex; align-items:baseline; justify-content:space-between; margin:8px 2px 14px;}
  .day-heading h2{font-family:'Oswald',sans-serif; font-size:22px; margin:0; font-weight:700;}
  .day-heading span{font-size:12.5px; color:var(--text-2);}

  .section-label{
    font-size:11px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); font-weight:700; margin:22px 4px 8px;
  }
  .section-label:first-child{margin-top:0;}

  .exercise-card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:10px; overflow:hidden; transition:border-color .25s, box-shadow .25s;
  }
  .exercise-card.exercise-complete{
    border-color:var(--glow-green);
    box-shadow:0 0 0 1px var(--glow-green), 0 0 14px 1px rgba(57,217,122,.45);
  }
  @keyframes exercisePulse{

let celebratedDays = new Set();
let pendingWrites = new Map(); // pendingKey -> {key, value, shared}
let storageIssueNotified = false;
let flushTimer = null;

/* ============ Storage helpers ============ */
function sleep(ms){ return new Promise(res=>setTimeout(res, ms)); }
function pendingKey(key, shared){ return (shared ? 's:' : 'p:') + key; }
function waitForFirebase(timeoutMs = 8000){
  if(window.__fb) return Promise.resolve(true);
  return new Promise(resolve=>{
    const timer = setTimeout(()=>{ resolve(false); }, timeoutMs);
    window.addEventListener('fbready', ()=>{ clearTimeout(timer); resolve(true); }, {once:true});
  });
}

async function storageGet(key, shared){
  try{
    if(shared){
      const ready = await waitForFirebase();
      if(!ready){ showFirebaseLoadError(); return null; }
      const raw = await window.__fb.get(key);
      return (typeof raw === 'string') ? JSON.parse(raw) : null;
    }
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

async function attemptStorageSet(key, value, shared){
  try{
    if(shared){
      const ready = await waitForFirebase();
      if(!ready){ showFirebaseLoadError(); return false; }
      await window.__fb.set(key, JSON.stringify(value));
      return true;
    }
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  }catch(e){ return false; }
}

let firebaseErrorShown = false;
function showFirebaseLoadError(){
  if(firebaseErrorShown) return;
  firebaseErrorShown = true;
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;inset:0;background:#0E0F12;color:#F3F2F0;z-index:200;display:flex;align-items:center;justify-content:center;padding:28px;font-family:Inter,system-ui,sans-serif;text-align:center;';
  el.innerHTML = `<div style="max-width:340px;">
    <div style="font-family:Oswald,sans-serif;font-size:20px;font-weight:700;margin-bottom:10px;">${t('firebase_error_title')}</div>
    <div style="font-size:14px;color:#9B9AA1;line-height:1.6;">${t('firebase_error_body')}</div>
  </div>`;
  document.body.appendChild(el);
}

async function storageSet(key, value, shared){
  // Sofort versuchen, bei Fehlschlag kurz danach nochmal (bis zu 3 Versuche insgesamt)
  for(let attempt=0; attempt<3; attempt++){
    const ok = await attemptStorageSet(key, value, shared);
    if(ok){
      pendingWrites.delete(pendingKey(key, shared));
      if(storageIssueNotified && pendingWrites.size === 0){
        storageIssueNotified = false;
        showToast('Wieder verbunden — Daten gespeichert ✓');
      }
      return true;
    }
    if(attempt < 2) await sleep(500 * (attempt+1));
  }
  // Nach 3 Versuchen weiterhin fehlgeschlagen: Eingabe bleibt im Speicher-Puffer,
  // wird automatisch im Hintergrund weiter versucht. Nichts geht verloren.
  pendingWrites.set(pendingKey(key, shared), { key, value, shared });
  if(!storageIssueNotified){
    storageIssueNotified = true;
    console.warn('Speichern fehlgeschlagen, versuche automatisch im Hintergrund weiter.');
    showToast('Speichern klappt gerade nicht — deine Eingaben bleiben erhalten, wird automatisch nachgeholt');
  }
  ensureFlushTimer();
  return false;
}

function ensureFlushTimer(){
  if(flushTimer) return;
  flushTimer = setInterval(async ()=>{
    if(pendingWrites.size === 0){ clearInterval(flushTimer); flushTimer = null; return; }
    for(const [pk, item] of Array.from(pendingWrites.entries())){
      const ok = await attemptStorageSet(item.key, item.value, item.shared);
      if(ok) pendingWrites.delete(pk);
    }
    if(pendingWrites.size === 0){
      clearInterval(flushTimer); flushTimer = null;
      if(storageIssueNotified){
        storageIssueNotified = false;
        showToast('Wieder verbunden — Daten gespeichert ✓');
      }
    }
  }, 6000);
}

let audioCtx = null;
let keepAliveOsc = null, keepAliveGain = null;
async function getAudioCtx(){
  if(!audioCtx || audioCtx.state === 'closed'){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended'){
    try{ await audioCtx.resume(); }catch(e){}
  }
  return audioCtx;
}
// Any tap anywhere in the app is a valid "user gesture" — use it to proactively keep
// the audio channel unlocked, instead of only trying at the exact moment a sound is needed.
document.addEventListener('pointerdown', ()=>{ getAudioCtx(); }, {passive:true});
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible') getAudioCtx();
});
async function startAudioKeepAlive(){
  try{
    const ctx = await getAudioCtx();
    stopAudioKeepAlive();
    keepAliveOsc = ctx.createOscillator();
    keepAliveGain = ctx.createGain();
    keepAliveGain.gain.value = 0.00001; // effectively silent, but keeps the context actively running
    keepAliveOsc.frequency.value = 20; // inaudible low frequency
    keepAliveOsc.connect(keepAliveGain).connect(ctx.destination);
    keepAliveOsc.start();
  }catch(e){}
}
function stopAudioKeepAlive(){
  try{
    if(keepAliveOsc){ keepAliveOsc.stop(); keepAliveOsc.disconnect(); keepAliveOsc = null; }
    if(keepAliveGain){ keepAliveGain.disconnect(); keepAliveGain = null; }
  }catch(e){}
}
async function brightChime(){
  try{
    audioCtx = await getAudioCtx();
    const now = audioCtx.currentTime;
    const fundamental = 2700;
    const partials = [1, 2.41, 3.86, 5.43]; // inharmonic ratios ~ triangle/bell overtones

    const master = audioCtx.createGain();
    master.gain.value = 0.55;
    master.connect(audioCtx.destination);

    // short feedback-delay for a shimmering reverb tail
    const delay = audioCtx.createDelay(1.0);
    delay.delayTime.value = 0.085;
    const feedback = audioCtx.createGain();
    feedback.gain.value = 0.38;
    const wet = audioCtx.createGain();
    wet.gain.value = 0.5;
    master.connect(delay);
    delay.connect(feedback); feedback.connect(delay);
    delay.connect(wet); wet.connect(audioCtx.destination);

    partials.forEach((ratio, i)=>{
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = fundamental * ratio;
      const amp = 0.5 / (i+1);
      const decay = 1.7 - i*0.18;
      g.gain.setValueAtTime(0.0001, now);
      g.gain.exponentialRampToValueAtTime(amp, now+0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, now+decay);
      osc.connect(g).connect(master);
      osc.start(now); osc.stop(now+decay+0.05);
    });
    if(navigator.vibrate) navigator.vibrate(40);
  }catch(e){}
}
async function prChime(){
  try{
    audioCtx = await getAudioCtx();
    const now = audioCtx.currentTime;
    [659, 880, 1108].forEach((freq, i)=>{
      const t = now + i*0.09;
      const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t+0.015);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.22);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t); osc.stop(t+0.24);
    });
    if(navigator.vibrate) navigator.vibrate([30,20,30,20,50]);
  }catch(e){}
}
async function buzzer(){
  try{
    audioCtx = await getAudioCtx();
    const now = audioCtx.currentTime;
    const blastDur = 0.65, gapBetween = 0.22;
    [0, blastDur + gapBetween, 2*(blastDur + gapBetween)].forEach(offset=>{
      const t = now + offset;
      const g = audioCtx.createGain();
      g.connect(audioCtx.destination);
      // Zwei leicht verstimmte, tiefe Sägezahn-Oszillatoren für einen vollen, hupenartigen Klang
      [98, 123].forEach(freq=>{
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        osc.connect(g);
        osc.start(t); osc.stop(t + blastDur + 0.05);
      });
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.42, t + 0.09);
      g.gain.setValueAtTime(0.42, t + blastDur - 0.12);
      g.gain.exponentialRampToValueAtTime(0.0001, t + blastDur);
    });
    if(navigator.vibrate) navigator.vibrate([650,220,650,220,650]);
  }catch(e){}
}

function animateWeekCard(){
  const duration = 1800;
  const start = performance.now();
  const numEls = Array.from(document.querySelectorAll('.count-target')).map(el=>({
    el, target: parseInt(el.dataset.target, 10) || 0
  }));
  const ringEl = document.querySelector('.week-ring-fill');
  const targetPct = ringEl ? parseFloat(ringEl.dataset.targetPct) || 0 : 0;
  const circumference = 2 * Math.PI * 42; // matches r=42 in the SVG

  function tick(now){
    const progress = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - progress, 3);
    numEls.forEach(({el, target})=>{
      el.textContent = Math.round(target * eased).toLocaleString(LOCALE_MAP[appLang]);
    });
    if(ringEl){
      const offset = circumference - (circumference * (targetPct/100) * eased);
      ringEl.style.strokeDashoffset = offset;
    }
    if(progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function getHomeStats(){
  const all = sharedData.verlauf || [];
  const mine = all.filter(e=>e.user === currentUser);
  const now = new Date();
  const day = (now.getDay() + 6) % 7; // Montag = 0
  const weekStart = new Date(now); weekStart.setHours(0,0,0,0); weekStart.setDate(now.getDate() - day);
  const thisWeekEntries = mine.filter(e => new Date(e.date) >= weekStart);
  const weekCount = thisWeekEntries.length;
  const weekVolume = thisWeekEntries.reduce((sum, entry)=>{
    return sum + entry.exercises.reduce((exSum, ex)=>{
      const w = ex.sets.reduce((s, set)=>{
        const val = toNum(set.weight);
        if(isNaN(val)) return s;
        return s + val * repsForSet(set, ex);
      }, 0);
      return exSum + w;
    }, 0);
  }, 0);
  const daysSinceLast = mine.length
    ? Math.floor((now - new Date(mine[0].date)) / 86400000)
    : null;
  return { weekCount, weekVolume, daysSinceLast, totalCount: mine.length };
}

function exportBackup(){
  try{
    const blob = new Blob([JSON.stringify(sharedData, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `trainingslog_backup_${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 2000);
    showToast(t('export_success_toast'));
  }catch(e){
    showToast(t('export_fail_toast'));
  }
}

/* ============ Workout ============ */
function openProgram(programId){
  currentProgramId = programId;
  const program = localizeProgram(sharedData.programs.find(p=>p.id===programId));
  currentDayId = program.days[0].id;
  document.getElementById('workoutProgramName').textContent = program.name;
  buildTabs();
  renderWorkout();
  showScreen('screenWorkout');
}
document.getElementById('workoutBack').onclick = ()=>{ renderHome(); showScreen('screenHome'); };

function getProgram(){ return sharedData.programs.find(p=>p.id===currentProgramId); }
function getDay(){ return getProgram().days.find(d=>d.id===currentDayId); }

function isExerciseComplete(programId, dayId, exId){
  const arr = workoutState[programId] && workoutState[programId][dayId] && workoutState[programId][dayId][exId];
  return !!(arr && arr.length && arr.every(s=>s.done));
}
function isDayComplete(programId, day){
  const all = [...day.main, ...(day.iso||[])];
  if(!all.length) return false;
  return all.every(ex=>isExerciseComplete(programId, day.id, ex.id));
}

function buildTabs(){
  const program = localizeProgram(getProgram());
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  program.days.forEach(d=>{
    const btn = document.createElement('button');
    let cls = 'tab';
    if(currentDayId===d.id) cls += ' active';
    if(isDayComplete(currentProgramId, d)) cls += ' complete';
    btn.className = cls;
    btn.textContent = d.label;
    btn.onclick = ()=>{ currentDayId = d.id; buildTabs(); renderWorkout(); };
    tabs.appendChild(btn);
  });
}

function getSetState(exId, setsCount){
  const p = currentProgramId, d = currentDayId;
  workoutState[p] = workoutState[p] || {};
  workoutState[p][d] = workoutState[p][d] || {};
  if(!workoutState[p][d][exId]){
    const lastWeight = (sharedData.gewichte[currentUser] && sharedData.gewichte[currentUser][exId]) || '';
    workoutState[p][d][exId] = Array.from({length:setsCount}, ()=>({weight:lastWeight, reps:'', done:false}));
  }
  return workoutState[p][d][exId];
}

function renderWorkout(){
  const rawDay = getDay();
  const localDay = localizeProgram(getProgram()).days.find(d=>d.id===currentDayId);
  document.getElementById('workoutDayTitle').textContent = `${localDay.label} · ${localDay.title}`;
  const main = document.getElementById('main');
  let html = `<div class="day-heading"><h2>${localDay.title}</h2><span>${localDay.sub || ''}</span></div>`;
  html += renderGroup(t('section_main'), rawDay.main.map(localizeExercise), true);
  html += renderGroup(t('section_iso'), (rawDay.iso||[]).map(localizeExercise), false);
  main.innerHTML = html;
  attachExerciseHandlers();
}

function renderGroup(label, exercises, isMain){
  if(!exercises || !exercises.length) return '';
  let html = `<div class="section-label">${label}</div>`;
  exercises.forEach(ex=>{
    const state = getSetState(ex.id, ex.sets);
    const hasTips = ex.tips && ex.tips.length;
    const complete = state.every(s=>s.done);
    html += `<div class="exercise-card ${complete?'exercise-complete':''}" data-excard="${ex.id}">
      <div class="exercise-head">
        <div>
          <div class="exercise-name">${ex.name}</div>
          ${ex.note ? `<div class="exercise-note">${ex.note}</div>` : ''}
        </div>
        <div class="exercise-target">${ex.sets} × ${ex.target}</div>
      </div>
      ${hasTips ? `
      <div class="tips-row">
        <button class="tips-toggle" data-tipstoggle="${ex.id}">ⓘ ${t('tips_button')}</button>
      </div>
      <div class="exercise-tips" id="tips-${ex.id}" style="display:none;">
        <ul>${ex.tips.map(tip=>`<li>${tip}</li>`).join('')}</ul>
      </div>` : ''}
      <div class="sets">`;
    state.forEach((s,i)=>{
      html += `<div class="set-row">
        <div class="set-num">${i+1}</div>
        <div class="weight-wrap"><input class="weight-input" type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" placeholder="${t('weight_placeholder')}" value="${s.weight||''}" data-ex="${ex.id}" data-set="${i}"></div>
        <span class="set-x">×</span>
        <input class="reps-input" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="${ex.target}" value="${s.reps||''}" data-ex="${ex.id}" data-set="${i}">
        <div class="set-check ${s.done?'done':''}" data-ex="${ex.id}" data-set="${i}">✓</div>
      </div>`;
    });
    html += `</div>
      <div class="exercise-footer">
        <button class="rest-btn" data-rest="${ex.rest || (isMain?REST_MAIN:REST_ISO)}" data-name="${ex.name}">${t('rest_start')} · ${ex.restLabel || (isMain?'2:30':'1:15')}</button>
      </div>
    </div>`;
  });
  return html;
}

function attachExerciseHandlers(){
  document.querySelectorAll('.weight-input').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ex = inp.dataset.ex, i = +inp.dataset.set;
      workoutState[currentProgramId][currentDayId][ex][i].weight = inp.value;
      await storageSet('laufendes_training', workoutState, false);
      checkPr(inp, ex);
    });
    checkPr(inp, inp.dataset.ex, {silent:true});
  });
  document.querySelectorAll('.reps-input').forEach(inp=>{
    inp.addEventListener('change', async ()=>{
      const ex = inp.dataset.ex, i = +inp.dataset.set;
      workoutState[currentProgramId][currentDayId][ex][i].reps = inp.value;
      await storageSet('laufendes_training', workoutState, false);
    });
  });
  document.querySelectorAll('.set-check').forEach(chk=>{
    chk.addEventListener('click', async ()=>{
      const ex = chk.dataset.ex, i = +chk.dataset.set;
      const stateArr = workoutState[currentProgramId][currentDayId][ex];
      const s = stateArr[i];
      s.done = !s.done;
      chk.classList.toggle('done', s.done);
      const dayState = workoutState[currentProgramId][currentDayId];
      if(s.done && !dayState.__meta) dayState.__meta = { startTime: Date.now() };

      const cardEl = chk.closest('.exercise-card');
      const wasComplete = cardEl.classList.contains('exercise-complete');
      const nowComplete = stateArr.every(x=>x.done);
      if(nowComplete){
        cardEl.classList.add('exercise-complete');
        if(!wasComplete){
          cardEl.classList.add('exercise-flash');
          setTimeout(()=>cardEl.classList.remove('exercise-flash'), 950);
          brightChime();
        }
      } else {
        cardEl.classList.remove('exercise-complete');
      }
      buildTabs();

      const dayKey = currentProgramId + ':' + currentDayId;
      if(isDayComplete(currentProgramId, getDay())){
        if(!celebratedDays.has(dayKey)){
          celebratedDays.add(dayKey);
          showCompletionScreen();
        }
      } else {
        celebratedDays.delete(dayKey);
      }

      await storageSet('laufendes_training', workoutState, false);
    });
  });
  document.querySelectorAll('.rest-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ startTimer(+btn.dataset.rest, btn.dataset.name); });
  });
  document.querySelectorAll('.tips-toggle').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const panel = document.getElementById('tips-' + btn.dataset.tipstoggle);
      const isOpen = panel.style.display !== 'none';
      panel.style.display = isOpen ? 'none' : 'block';
      btn.classList.toggle('open', !isOpen);
    });
  });
}

function checkPr(inp, exId, opts={}){
  const row = inp.closest('.set-row');
  const wrap = inp.closest('.weight-wrap');
  const prevBest = (sharedData.gewichte[currentUser] && sharedData.gewichte[currentUser][exId]) || 0;
  const val = toNum(inp.value);
  let badge = wrap.querySelector('.pr-badge');
  if(prevBest > 0 && !isNaN(val) && val > prevBest){
    inp.classList.add('pr-input');
    if(!badge){
      badge = document.createElement('span');
      badge.className = 'pr-badge';
      badge.textContent = 'PR';
      wrap.appendChild(badge);
    }
    if(!row.dataset.prNotified){
      row.dataset.prNotified = '1';
      if(!opts.silent) prChime();
    }
  } else {
    inp.classList.remove('pr-input');
    if(badge) badge.remove();
    row.dataset.prNotified = '';
  }
}

function showCompletionScreen(){
  const rawDay = getDay();
  const day = localizeProgram(getProgram()).days.find(d=>d.id===currentDayId);
  const all = [...rawDay.main, ...(rawDay.iso||[])];
  const totalSets = all.reduce((n,e)=>n+e.sets, 0);
  const prCount = document.querySelectorAll('.pr-badge').length;
  const meta = workoutState[currentProgramId][currentDayId].__meta;
  const durationMin = meta ? Math.max(1, Math.round((Date.now()-meta.startTime)/60000)) : null;

  document.getElementById('completionTitle').textContent = `${day.label} ${t('completion_suffix')}`;
  document.getElementById('completionSub').textContent = `${day.title} ${t('completion_sub_join')}`;

  const stats = [{num:totalSets, label:t('completion_stat_sets')}];
  if(durationMin) stats.push({num:durationMin, label:t('completion_stat_minutes')});
  stats.push({num:prCount, label:prCount === 1 ? t('completion_stat_pr_1') : t('completion_stat_pr_n')});
  document.getElementById('completionStats').innerHTML = stats.map(s=>
    `<div class="completion-stat"><div class="completion-stat-num">${s.num}</div><div class="completion-stat-label">${s.label}</div></div>`
  ).join('');

  document.getElementById('completionScreen').style.display = 'flex';
}
document.getElementById('completionContinueBtn').onclick = ()=>{
  document.getElementById('completionScreen').style.display = 'none';
};
document.getElementById('completionFinishBtn').onclick = ()=>{
  document.getElementById('completionScreen').style.display = 'none';
  document.getElementById('finishBtn').click();
};

/* ============ Rest timer ============ */
let timerEndAt = null;
function startTimer(seconds, label){
  clearInterval(timerInterval);
  timerTotal = seconds;
  timerEndAt = Date.now() + seconds * 1000;
  timerRemaining = seconds;
  document.getElementById('timerContext').textContent = label;
  document.getElementById('timerBar').classList.add('show');
  startAudioKeepAlive();
  updateTimerDisplay();
  timerInterval = setInterval(tickTimer, 1000);
}
function tickTimer(){
  timerRemaining = Math.max(0, Math.round((timerEndAt - Date.now()) / 1000));
  if(timerRemaining <= 0){
    clearInterval(timerInterval); updateTimerDisplay();
    buzzer(); setTimeout(hideTimer, 900); return;
  }
  updateTimerDisplay();
}
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState === 'visible' && timerEndAt && document.getElementById('timerBar').classList.contains('show')){
    tickTimer(); // recalculate immediately from real elapsed time (setInterval may have been throttled/paused)
  }
});
function updateTimerDisplay(){
  const m = Math.floor(timerRemaining/60), s = timerRemaining%60;
  document.getElementById('timerClock').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerFill').style.width = Math.max(0,(timerRemaining/timerTotal)*100) + '%';
}
function hideTimer(){ document.getElementById('timerBar').classList.remove('show'); clearInterval(timerInterval); timerEndAt = null; stopAudioKeepAlive(); }
document.getElementById('timerPlus').onclick = ()=>{ timerEndAt += 15000; timerRemaining += 15; timerTotal = Math.max(timerTotal, timerRemaining); updateTimerDisplay(); };
document.getElementById('timerMinus').onclick = ()=>{ timerEndAt = Math.max(Date.now(), timerEndAt - 15000); timerRemaining = Math.max(0, timerRemaining-15); updateTimerDisplay(); };
document.getElementById('timerSkip').onclick = hideTimer;

/* ============ Finish workout ============ */
document.getElementById('finishBtn').addEventListener('click', ()=>{
  const program = getProgram(), day = getDay();
  const all = [...day.main, ...(day.iso||[])];
  const exList = all.map(ex=>{
    const state = workoutState[currentProgramId] && workoutState[currentProgramId][currentDayId] && workoutState[currentProgramId][currentDayId][ex.id];
    return { id: ex.id, name: ex.name, target: ex.target, sets: state || [] };
  });
  const doneCount = exList.reduce((n,e)=>n + e.sets.filter(s=>s.done).length, 0);
  const totalCount = all.reduce((n,e)=>n+e.sets, 0);
  const meta = workoutState[currentProgramId][currentDayId].__meta;
  const durationMin = meta ? Math.max(1, Math.round((Date.now()-meta.startTime)/60000)) : null;

  const entry = {
    id: Date.now(), user: currentUser,
    programId: currentProgramId, programName: program.name,
    dayLabel: `${day.label} · ${day.title}`,
    date: new Date().toISOString(),
    doneCount, totalCount, durationMin, exercises: exList
  };

  const weightUpdates = {};
  exList.forEach(e=>{
    const weights = e.sets.map(s=>toNum(s.weight)).filter(w=>!isNaN(w));
    if(weights.length){
      const maxW = Math.max(...weights);
      const prevBest = (sharedData.gewichte[currentUser] || {})[e.id] || 0;
      if(maxW > prevBest) weightUpdates[e.id] = maxW;
    }
  });

  const pendingProgramId = currentProgramId, pendingDayId = currentDayId;
  let undone = false;

  showUndoToast(t('undo_saving'), ()=>{
    undone = true;
  }, async ()=>{
    if(undone) return;
    sharedData.verlauf = sharedData.verlauf || [];
    sharedData.verlauf.unshift(entry);
    sharedData.verlauf = sharedData.verlauf.slice(0, 500);
    sharedData.gewichte[currentUser] = sharedData.gewichte[currentUser] || {};
    Object.entries(weightUpdates).forEach(([id, val])=>{ sharedData.gewichte[currentUser][id] = val; });

    const ok = await storageSet('trainingslog_daten', sharedData, true);
    if(workoutState[pendingProgramId]) workoutState[pendingProgramId][pendingDayId] = {};
    await storageSet('laufendes_training', workoutState, false);

    if(currentProgramId === pendingProgramId && currentDayId === pendingDayId){
      buildTabs();
      renderWorkout();
    }
    if(!ok) showToast(t('save_fail_toast'));
  }, 8000);
});

function showUndoToast(message, onUndo, onConfirm, delay){
  const toastEl = document.getElementById('toast');
  clearTimeout(toastEl._undoTimer);
  toastEl.innerHTML = `<span>${message}</span><button class="toast-undo-btn" id="toastUndoBtn">${t('undo_btn')}</button>`;
  toastEl.classList.add('show', 'toast-undo');
  let resolved = false;
  document.getElementById('toastUndoBtn').onclick = ()=>{
    if(resolved) return;
    resolved = true;
    clearTimeout(toastEl._undoTimer);
    toastEl.classList.remove('show', 'toast-undo');
    onUndo();
    showToast(t('undo_done_toast'));
  };
  toastEl._undoTimer = setTimeout(()=>{
    if(resolved) return;
    resolved = true;
    toastEl.classList.remove('show', 'toast-undo');
    onConfirm();
  }, delay);
}

function showToast(msg){
  const t = document.getElementById('toast');
  clearTimeout(t._undoTimer);
  t.classList.remove('toast-undo');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ============ History ============ */
function getKnownUsers(){
  if(sharedData.nutzerListe && sharedData.nutzerListe.length) return sharedData.nutzerListe;
  return Array.from(new Set((sharedData.verlauf||[]).map(e=>e.user)));
}

function buildExerciseIndex(){
  const map = {};
  (sharedData.verlauf||[]).forEach(entry=>{
    entry.exercises.forEach(e=>{
      if(!map[e.id]) map[e.id] = { id:e.id, name:e.name, count:0 };
      map[e.id].count++;
    });
  });
  return Object.values(map).sort((a,b)=> b.count - a.count || a.name.localeCompare(b.name));
}

function renderProgressCard(){
  const card = document.getElementById('progressCard');
  const exIndex = buildExerciseIndex();
  if(!exIndex.length){ card.style.display = 'none'; return; }
  card.style.display = 'block';

  const select = document.getElementById('progressExercise');
  if(!progressExerciseId || !exIndex.find(e=>e.id===progressExerciseId)) progressExerciseId = exIndex[0].id;
  select.innerHTML = exIndex.map(e=>`<option value="${e.id}" ${e.id===progressExerciseId?'selected':''}>${e.name}</option>`).join('');
  select.onchange = ()=>{ progressExerciseId = select.value; renderProgressChart(); };

  document.querySelectorAll('#progressMetricToggle button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.metric === progressMetric);
    btn.onclick = ()=>{
      progressMetric = btn.dataset.metric;
      document.querySelectorAll('#progressMetricToggle button').forEach(b=>b.classList.toggle('active', b.dataset.metric===progressMetric));
      renderProgressChart();
    };
  });

  const chipsWrap = document.getElementById('progressChips');
  const users = getKnownUsers();
  if(progressUserFilter === 'alle' || !users.includes(progressUserFilter)){
    progressUserFilter = users.includes(currentUser) ? currentUser : (users[0] || currentUser);
  }
  chipsWrap.innerHTML = users.map(u=>`<button class="progress-chip ${progressUserFilter===u?'active':''}" data-user="${u}">${u}</button>`).join('');
  chipsWrap.querySelectorAll('.progress-chip').forEach(btn=>{
    btn.onclick = ()=>{ progressUserFilter = btn.dataset.user; renderProgressCard(); };
  });

  renderProgressChart();
}

function avgReps(targetStr){
  const nums = ((targetStr||'').match(/\d+/g) || []).map(Number);
  if(!nums.length) return 10;
  if(nums.length >= 2) return (nums[0] + nums[1]) / 2;
  return nums[0];
}
function findTargetFallback(exId){
  for(const p of sharedData.programs){
    for(const d of p.days){
      const found = [...d.main, ...(d.iso||[])].find(e=>e.id===exId);
      if(found) return found.target;
    }
  }
  return null;
}
function repsForSet(set, ex){
  const r = toNum(set.reps);
  if(!isNaN(r) && r > 0) return r;
  return avgReps(ex.target || findTargetFallback(ex.id));
}

function renderProgressChart(){
  const body = document.getElementById('progressBody');
  const exIndex = buildExerciseIndex();
  const exMeta = exIndex.find(e=>e.id===progressExerciseId);

  let points = [];
  sharedData.verlauf.slice().reverse().forEach(entry=>{
    if(progressUserFilter !== 'alle' && entry.user !== progressUserFilter) return;
    const ex = entry.exercises.find(e=>e.id===progressExerciseId);
    if(!ex) return;
    const weights = ex.sets.map(s=>toNum(s.weight)).filter(w=>!isNaN(w));
    if(!weights.length) return;
    let value;
    if(progressMetric === 'volumen'){
      value = ex.sets.reduce((sum, set)=>{
        const w = toNum(set.weight);
        if(isNaN(w)) return sum;
        return sum + w*repsForSet(set, ex);
      }, 0);
    } else {
      value = Math.max(...weights);
    }
    points.push({ date:new Date(entry.date), weight:value, user:entry.user });
  });

  if(points.length < 2){
    const typeLabel = progressMetric === 'volumen' ? t('progress_volume_data') : t('progress_weight_data');
    const nameLabel = exMeta ? exMeta.name : '';
    body.innerHTML = `<div class="progress-empty">${t('progress_not_enough').replace('{type}', typeLabel).replace('{name}', nameLabel)}</div>`;
    return;
  }

  const unit = progressMetric === 'volumen' ? 'kg Vol.' : 'kg';
  const first = points[0], last = points[points.length-1];
  const delta = last.weight - first.weight;
  const deltaClass = delta > 0 ? 'delta-up' : (delta < 0 ? 'delta-down' : '');
  const deltaSign = delta > 0 ? '+' : '';
  const deltaStr = (Math.round(delta*10)/10).toString();
  const statHtml = `<div class="progress-stat">${t('progress_start_label')} <b>${Math.round(first.weight)} ${unit}</b> → ${t('progress_now_label')} <b>${Math.round(last.weight)} ${unit}</b> <span class="${deltaClass}">(${deltaSign}${deltaStr} ${unit})</span></div>`;

  const w = 320, h = 150, padL = 34, padR = 12, padT = 14, padB = 22;
  const weights = points.map(p=>p.weight);
  let min = Math.min(...weights), max = Math.max(...weights);
  if(min === max){ min -= 2; max += 2; }
  const pad = (max-min)*0.15;
  min = Math.max(0, min-pad); max = max+pad;
  const xFor = i => padL + i*(w-padL-padR)/(points.length-1);
  const yFor = val => padT + (max-val)/(max-min)*(h-padT-padB);

  const path = points.map((p,i)=> `${i===0?'M':'L'} ${xFor(i).toFixed(1)} ${yFor(p.weight).toFixed(1)}`).join(' ');

  let gridHtml = '';
  [min, (min+max)/2, max].forEach(val=>{
    const y = yFor(val);
    gridHtml += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${w-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3,4"/>`;
    gridHtml += `<text class="progress-axis-label" x="${padL-6}" y="${(y+3).toFixed(1)}" text-anchor="end">${Math.round(val)}</text>`;
  });

  let dotsHtml = '';
  const labelEvery = Math.max(1, Math.ceil(points.length/5));
  points.forEach((p,i)=>{
    const x = xFor(i), y = yFor(p.weight);
    dotsHtml += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="var(--accent)" stroke="var(--surface)" stroke-width="2"><title>${p.date.toLocaleDateString(LOCALE_MAP[appLang])} · ${Math.round(p.weight)} ${unit}${progressUserFilter==='alle' ? ' · '+p.user : ''}</title></circle>`;
    if(i===0 || i===points.length-1 || i % labelEvery === 0){
      dotsHtml += `<text class="progress-point-label" x="${x.toFixed(1)}" y="${h-4}" text-anchor="middle">${p.date.toLocaleDateString(LOCALE_MAP[appLang],{day:'2-digit',month:'2-digit'})}</text>`;
    }
  });

  body.innerHTML = statHtml + `<div class="progress-chart-wrap">
    <svg viewBox="0 0 ${w} ${h}" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
      ${gridHtml}
      <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dotsHtml}
    </svg>
  </div>`;
}

function renderHistory(){
  renderProgressCard();
  const main = document.getElementById('historyList');
  const users = getKnownUsers();
  const filterHtml = users.length > 1 ? `<div class="history-filter">
    <button class="progress-chip history-user-chip ${historyUserFilter==='alle'?'active':''}" data-histuser="alle">${t('progress_alle')}</button>
    ${users.map(u=>`<button class="progress-chip history-user-chip ${historyUserFilter===u?'active':''}" data-histuser="${u}">${u}</button>`).join('')}
  </div>` : '';

  const entries = historyUserFilter === 'alle' ? sharedData.verlauf : (sharedData.verlauf||[]).filter(e=>e.user===historyUserFilter);

  if(!entries || entries.length === 0){
    main.innerHTML = filterHtml + `<div class="empty-state">${t('history_empty_title')}<br>${t('history_empty_sub')}</div>`;
    wireHistoryFilterChips(main);
    return;
  }
  let html = filterHtml;
  entries.forEach(entry=>{
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString(LOCALE_MAP[appLang], {day:'2-digit', month:'2-digit', year:'2-digit'});
    const timeStr = d.toLocaleTimeString(LOCALE_MAP[appLang], {hour:'2-digit', minute:'2-digit'});
    const exSummary = entry.exercises
      .filter(e=>e.sets.some(s=>s.done || s.weight))
      .map(e=>{
        const setStrs = e.sets.filter(s=>s.weight).map(s=> s.reps ? `${s.weight}×${s.reps}` : `${s.weight}`);
        return `${e.name}${setStrs.length ? ' — ' + setStrs.join('/') + ' kg' : ''}`;
      }).join(' · ');
    html += `<div class="history-entry">
      ${entry.user === currentUser ? `<div class="history-actions">
        <button class="history-edit" data-edithistory="${entry.id}" title="${t('edit_title')}">✎</button>
        <button class="history-del" data-delhistory="${entry.id}" title="${t('delete_title')}">×</button>
      </div>` : ''}
      <span class="history-user">${entry.user}</span>
      <div class="history-program">${entry.programName || ''}</div>
      <div class="history-top">
        <div class="history-day">${entry.dayLabel}</div>
        <div class="history-meta">${dateStr} · ${timeStr}</div>
      </div>
      <div class="history-meta" style="margin-bottom:6px;">${entry.doneCount}/${entry.totalCount} ${t('sets_done_label')}${entry.durationMin ? ' · ' + entry.durationMin + ' ' + t('min_label') : ''}</div>
      <div class="history-exlist">${exSummary || t('history_no_details')}</div>
    </div>`;
  });
  main.innerHTML = html;
  wireHistoryFilterChips(main);

  main.querySelectorAll('[data-edithistory]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      openHistoryEdit(btn.dataset.edithistory);
    });
  });
  main.querySelectorAll('[data-delhistory]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      deleteHistoryEntry(btn.dataset.delhistory);
    });
  });
}

function wireHistoryFilterChips(container){
  container.querySelectorAll('[data-histuser]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      historyUserFilter = btn.dataset.histuser;
      renderHistory();
    });
  });
}

async function deleteHistoryEntry(entryId){
  const entry = sharedData.verlauf.find(e=>e.id == entryId);
  if(!entry || entry.user !== currentUser) return;
  if(!confirm(t('history_delete_confirm'))) return;
  sharedData.verlauf = sharedData.verlauf.filter(e=>e.id != entryId);
  await storageSet('trainingslog_daten', sharedData, true);
  renderHistory();
  showToast(t('history_deleted_toast'));
}

/* ============ History entry editing ============ */
let editingEntryId = null;
let editingEntryDraft = null;

function openHistoryEdit(entryId){
  const entry = sharedData.verlauf.find(e=>e.id == entryId);
  if(!entry || entry.user !== currentUser) return;
  editingEntryId = entryId;
  editingEntryDraft = JSON.parse(JSON.stringify(entry));
  document.getElementById('historyEditProgramName').textContent = entry.programName || '';
  document.getElementById('historyEditDayTitle').textContent = entry.dayLabel;
  renderHistoryEditBody();
  showScreen('screenHistoryEdit');
}

function renderHistoryEditBody(){
  const body = document.getElementById('historyEditBody');
  let html = '';
  editingEntryDraft.exercises.forEach(ex=>{
    html += `<div class="exercise-card">
      <div class="exercise-head"><div class="exercise-name">${ex.name}</div></div>
      <div class="sets">`;
    ex.sets.forEach((s,i)=>{
      html += `<div class="set-row">
        <div class="set-num">${i+1}</div>
        <div class="weight-wrap"><input class="weight-input" type="text" inputmode="decimal" pattern="[0-9]*[.,]?[0-9]*" value="${s.weight||''}" placeholder="${t('weight_placeholder')}" data-editex="${ex.id}" data-editset="${i}" data-field="weight"></div>
        <span class="set-x">×</span>
        <input class="reps-input" type="text" inputmode="numeric" pattern="[0-9]*" value="${s.reps||''}" placeholder="${t('reps_placeholder')}" data-editex="${ex.id}" data-editset="${i}" data-field="reps">
        <div class="set-check ${s.done?'done':''}" data-editex="${ex.id}" data-editset="${i}">✓</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  body.innerHTML = html;

  body.querySelectorAll('.weight-input, .reps-input').forEach(inp=>{
    inp.addEventListener('change', ()=>{
      const exId = inp.dataset.editex, i = +inp.dataset.editset, field = inp.dataset.field;
      const ex = editingEntryDraft.exercises.find(e=>e.id===exId);
      ex.sets[i][field] = inp.value;
    });
  });
  body.querySelectorAll('.set-check').forEach(chk=>{
    chk.addEventListener('click', ()=>{
      const exId = chk.dataset.editex, i = +chk.dataset.editset;
      const ex = editingEntryDraft.exercises.find(e=>e.id===exId);
      ex.sets[i].done = !ex.sets[i].done;
      chk.classList.toggle('done', ex.sets[i].done);
    });
  });
}

document.getElementById('historyEditBack').onclick = ()=>{ renderHistory(); showScreen('screenHistory'); };

document.getElementById('historyEditSave').addEventListener('click', async ()=>{
  if(!editingEntryDraft || editingEntryDraft.user !== currentUser) return;
  editingEntryDraft.doneCount = editingEntryDraft.exercises.reduce((n,e)=>n + e.sets.filter(s=>s.done).length, 0);
  const idx = sharedData.verlauf.findIndex(e=>e.id == editingEntryId);
  if(idx > -1) sharedData.verlauf[idx] = editingEntryDraft;
  const ok = await storageSet('trainingslog_daten', sharedData, true);
  showToast(ok ? t('history_updated_toast') : t('save_fail_toast'));
  renderHistory();
  showScreen('screenHistory');
});

/* ============ Builder ============ */
function openBuilder(editProgramId){
  if(editProgramId){
    const existing = sharedData.programs.find(p=>p.id===editProgramId);
    builderState = {
      editingId: existing.id,
      editingBuiltIn: !!existing.builtIn,
      name: existing.name,
      subtitle: existing.subtitle || '',
      days: JSON.parse(JSON.stringify(existing.days)).map(d=>({
        id:d.id, label:d.label, title:d.title||'', sub:d.sub||'',
        main:d.main||[], iso:d.iso||[]
      }))
    };
    document.getElementById('builderEyebrow').textContent = t('builder_edit_title');
    document.getElementById('builderHeading').textContent = existing.name;
  } else {
    builderState = { editingId:null, editingBuiltIn:false, name:'', subtitle:'', days:[] };
    addBuilderDay();
    document.getElementById('builderEyebrow').textContent = t('builder_new_title');
    document.getElementById('builderHeading').textContent = t('builder_new_heading');
  }
  document.getElementById('builderName').value = builderState.name;
  document.getElementById('builderSubtitle').value = builderState.subtitle;
  renderBuilder();
  showScreen('screenBuilder');
}
document.getElementById('builderBack').onclick = ()=>{ renderHome(); showScreen('screenHome'); };
document.getElementById('addDayBtn').onclick = ()=>{ addBuilderDay(); renderBuilder(); };

function addBuilderDay(){
  builderState.days.push({
    id: uid('day'), label:`${t('builder_day_placeholder').replace(/\s*1$/,'')} ${builderState.days.length+1}`, title:'', sub:'', main:[], iso:[]
  });
}

function renderBuilder(){
  const container = document.getElementById('builderDays');
  let html = '';
  builderState.days.forEach((day, dIdx)=>{
    html += `<div class="day-block" data-day="${day.id}">
      <div class="day-block-head">
        <input class="field-input" style="max-width:90px;" data-daylabel="${day.id}" value="${day.label}" placeholder="${t('builder_day_placeholder')}">
        <input class="field-input" data-daytitle="${day.id}" value="${day.title}" placeholder="${t('builder_title_placeholder')}">
        ${builderState.days.length>1 ? `<button class="day-del" data-daydel="${day.id}">🗑</button>` : ''}
      </div>
      <input class="field-input" style="margin-bottom:10px;" data-daysub="${day.id}" value="${day.sub}" placeholder="${t('builder_focus_placeholder')}">
      <div data-exlist="${day.id}">`;
    [...day.main.map(e=>({...e,cat:'main'})), ...day.iso.map(e=>({...e,cat:'iso'}))].forEach(ex=>{
      html += `<div class="ex-mini-row">
        <div class="ex-mini-info">
          <div class="ex-mini-name">${ex.name}</div>
          <div class="ex-mini-meta">${ex.sets} × ${ex.target} · ${ex.cat==='main'?t('builder_main'):t('builder_iso')}</div>
        </div>
        <button class="ex-mini-del" data-exdel="${day.id}:${ex.id}">×</button>
      </div>`;
    });
    html += `</div>
      <div class="add-ex-form">
        <input placeholder="${t('builder_ex_name_placeholder')}" data-newname="${day.id}">
        <input placeholder="${t('builder_sets_placeholder')}" type="number" data-newsets="${day.id}" value="3">
        <input placeholder="${t('builder_target_placeholder')}" data-newtarget="${day.id}" value="10–12">
        <select data-newtype="${day.id}">
          <option value="main">${t('builder_main')}</option>
          <option value="iso">${t('builder_iso')}</option>
        </select>
        <input class="add-ex-tips" placeholder="${t('builder_tips_placeholder')}" data-newtips="${day.id}">
        <button class="add-ex-btn" data-addex="${day.id}">${t('builder_add_ex')}</button>
      </div>
    </div>`;
  });
  container.innerHTML = html;

  container.querySelectorAll('[data-daylabel]').forEach(inp=>inp.addEventListener('input', ()=>{
    findDay(inp.dataset.daylabel).label = inp.value;
  }));
  container.querySelectorAll('[data-daytitle]').forEach(inp=>inp.addEventListener('input', ()=>{
    findDay(inp.dataset.daytitle).title = inp.value;
  }));
  container.querySelectorAll('[data-daysub]').forEach(inp=>inp.addEventListener('input', ()=>{
    findDay(inp.dataset.daysub).sub = inp.value;
  }));
  container.querySelectorAll('[data-daydel]').forEach(btn=>btn.addEventListener('click', ()=>{
    builderState.days = builderState.days.filter(d=>d.id !== btn.dataset.daydel);
    renderBuilder();
  }));
  container.querySelectorAll('[data-exdel]').forEach(btn=>btn.addEventListener('click', ()=>{
    const [dayId, exId] = btn.dataset.exdel.split(':');
    const day = findDay(dayId);
    day.main = day.main.filter(e=>e.id!==exId);
    day.iso = day.iso.filter(e=>e.id!==exId);
    renderBuilder();
  }));
  container.querySelectorAll('[data-addex]').forEach(btn=>btn.addEventListener('click', ()=>{
    const dayId = btn.dataset.addex;
    const day = findDay(dayId);
    const nameInp = container.querySelector(`[data-newname="${dayId}"]`);
    const setsInp = container.querySelector(`[data-newsets="${dayId}"]`);
    const targetInp = container.querySelector(`[data-newtarget="${dayId}"]`);
    const typeSel = container.querySelector(`[data-newtype="${dayId}"]`);
    const tipsInp = container.querySelector(`[data-newtips="${dayId}"]`);
    if(!nameInp.value.trim()) { nameInp.focus(); return; }
    const tips = tipsInp.value.split(',').map(t=>t.trim()).filter(Boolean);
    const ex = { id: uid('ex'), name: nameInp.value.trim(), sets: parseInt(setsInp.value)||3, target: targetInp.value.trim()||'10-12' };
    if(tips.length) ex.tips = tips;
    if(typeSel.value==='main') day.main.push(ex); else day.iso.push(ex);
    renderBuilder();
  }));
}
function findDay(dayId){ return builderState.days.find(d=>d.id===dayId); }

document.getElementById('builderName').addEventListener('input', e=>{ builderState.name = e.target.value; });
document.getElementById('builderSubtitle').addEventListener('input', e=>{ builderState.subtitle = e.target.value; });

document.getElementById('builderSave').addEventListener('click', async ()=>{
  const name = document.getElementById('builderName').value.trim();
  if(!name){ document.getElementById('builderName').focus(); showToast(t('builder_name_missing_toast')); return; }
  const hasExercise = builderState.days.some(d => (d.main.length + d.iso.length) > 0);
  if(!hasExercise){ showToast(t('builder_no_exercise_toast')); return; }
  const days = builderState.days.map(d=>({...d, title: d.title || d.label}));
  if(builderState.editingId){
    const idx = sharedData.programs.findIndex(p=>p.id===builderState.editingId);
    if(idx > -1){
      sharedData.programs[idx] = {
        ...sharedData.programs[idx],
        name, subtitle: document.getElementById('builderSubtitle').value.trim(), days
      };
    }
  } else {
    sharedData.programs.push({
      id: uid('prog'), name, subtitle: document.getElementById('builderSubtitle').value.trim(),
      builtIn:false, days
    });
  }
  await storageSet('trainingslog_daten', sharedData, true);
  showToast(t('builder_save_toast'));
  renderHome();
  showScreen('screenHome');
});

/* ============ Swipe navigation between days ============ */
(function setupDaySwipe(){
  const el = document.getElementById('screenWorkout');
  let startX = 0, startY = 0, startedInTabs = false;
  el.addEventListener('touchstart', e=>{
    const t = e.touches[0];
    startX = t.clientX; startY = t.clientY;
    startedInTabs = !!e.target.closest('.tabs');
  }, {passive:true});
  el.addEventListener('touchend', e=>{
    if(startedInTabs || !currentProgramId) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX, dy = t.clientY - startY;
    if(Math.abs(dx) < 70 || Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const program = getProgram();
    const idx = program.days.findIndex(d=>d.id===currentDayId);
    if(dx < 0 && idx < program.days.length - 1){
      currentDayId = program.days[idx+1].id; buildTabs(); renderWorkout();
    } else if(dx > 0 && idx > 0){
      currentDayId = program.days[idx-1].id; buildTabs(); renderWorkout();
    }
  }, {passive:true});
})();

init();
